<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Gallery - Destruction Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            overflow: hidden;
            background: radial-gradient(circle, #222 0%, #000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .target-container {
            position: relative;
            width: 100%;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
            perspective: 1000px;
        }

        #target-canvas {
            max-height: 120%;
            max-width: 90%;
            filter: drop-shadow(0 0 40px rgba(0,0,0,0.8));
            user-select: none;
            cursor: none;
            transition: transform 0.05s;
        }

        /* Efek Lubang Peluru */
        .bullet-hole {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #000 30%, #333 60%, transparent 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            box-shadow: inset 0 0 5px #000;
        }

        /* Muzzle Flash (Api Moncong) */
        .muzzle-flash {
            position: fixed;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 0%, #ffdf00 40%, #ff4500 70%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 110;
            opacity: 0;
            transform: translate(-50%, -100%);
        }

        .flash-active {
            animation: flash-anim 0.05s ease-out;
        }

        @keyframes flash-anim {
            0% { opacity: 1; transform: translate(-50%, -100%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(2); }
        }

        /* Pistol Cursor */
        .gun-cursor {
            position: fixed;
            width: 250px;
            height: 250px;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: transform 0.05s;
        }

        .recoil-anim {
            animation: recoil 0.1s ease-out;
        }

        @keyframes recoil {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            50% { transform: translate(-50%, -80%) rotate(-20deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        #upload-overlay {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 200;
        }

        .hit-effect {
            position: absolute;
            pointer-events: none;
            font-size: 3rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 2px 2px 0 #000;
            animation: hit-float 0.5s ease-out forwards;
            z-index: 60;
        }

        @keyframes hit-float {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.5); }
        }
    </style>
</head>
<body class="m-0 p-0">

    <div id="game-container">
        <!-- Scoreboard -->
        <div class="absolute top-8 left-8 z-20">
            <div class="text-xs font-bold text-yellow-500 tracking-[0.5em] uppercase">Target Neutralized</div>
            <div class="text-7xl font-black text-white italic" id="score">0</div>
        </div>

        <div class="absolute top-8 right-8 z-20">
            <button onclick="resetGame()" class="bg-transparent hover:bg-white hover:text-black text-white px-6 py-2 border-2 border-white transition-all font-bold cursor-pointer">RELOAD IMAGE</button>
        </div>

        <!-- Target Area -->
        <div id="target-wrapper" class="target-container hidden">
            <canvas id="target-canvas" onclick="handleShoot(event)"></canvas>
            <div id="hole-container" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <!-- Muzzle Flash -->
        <div id="flash" class="muzzle-flash"></div>

        <!-- Pistol -->
        <div id="gun" class="gun-cursor hidden">
            <svg viewBox="0 0 100 100" width="250" height="250">
                <!-- Sederhana Pistol Icon -->
                <text x="50" y="50" font-size="80" text-anchor="middle" dominant-baseline="middle">??</text>
            </svg>
        </div>

        <!-- Start Screen -->
        <div id="upload-overlay" class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center">
            <h1 class="text-6xl font-black text-white mb-4 tracking-tighter">TARGET PRACTICE</h1>
            <p class="text-yellow-500 font-mono mb-10 tracking-widest uppercase">Select your target for elimination</p>
            
            <label class="cursor-pointer bg-white text-black px-12 py-6 font-black text-2xl hover:bg-yellow-500 transition-all mb-8 inline-block">
                UPLOAD FOTO
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="processImage(event)">
            </label>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Suara Tembakan Nyata (Synthesized)
        function playGunshot() {
            // 1. Bunyi ledakan utama
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);

            // 2. White noise untuk percikan ledakan
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();
        }

        let score = 0;
        const canvas = document.getElementById('target-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const targetWrapper = document.getElementById('target-wrapper');
        const holeContainer = document.getElementById('hole-container');
        const uploadOverlay = document.getElementById('upload-overlay');
        const scoreDisplay = document.getElementById('score');
        const gun = document.getElementById('gun');
        const flash = document.getElementById('flash');

        document.addEventListener('mousemove', (e) => {
            gun.style.left = e.clientX + 'px';
            gun.style.top = e.clientY + 'px';
            flash.style.left = e.clientX + 'px';
            flash.style.top = e.clientY + 'px';
        });

        async function processImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    setupCanvas(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setupCanvas(img) {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            removeBackground();
            
            uploadOverlay.classList.add('hidden');
            targetWrapper.classList.remove('hidden');
            gun.classList.remove('hidden');
            score = 0;
            scoreDisplay.innerText = score;
            holeContainer.innerHTML = '';
        }

        function removeBackground() {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const rBG = data[0], gBG = data[1], bBG = data[2];
            const threshold = 60; 

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                const diff = Math.sqrt(Math.pow(r - rBG, 2) + Math.pow(g - gBG, 2) + Math.pow(b - bBG, 2));
                if (diff < threshold) data[i + 3] = 0; 
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function handleShoot(e) {
            // Gun Recoil
            gun.classList.remove('recoil-anim');
            void gun.offsetWidth;
            gun.classList.add('recoil-anim');

            // Muzzle Flash
            flash.classList.remove('flash-active');
            void flash.offsetWidth;
            flash.classList.add('flash-active');

            // Sound
            playGunshot();

            score++;
            scoreDisplay.innerText = score;

            // Screen Shake
            targetWrapper.style.transform = `translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*20}px)`;
            setTimeout(() => targetWrapper.style.transform = '', 50);

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Destructive Effect on Canvas
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 15 + Math.random() * 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // Visual Bullet Hole
            addBulletHole(e.clientX - rect.left, e.clientY - rect.top);
            createSparks(e.clientX, e.clientY);
        }

        function addBulletHole(x, y) {
            const hole = document.createElement('div');
            hole.className = 'bullet-hole';
            hole.style.left = (x - 10) + 'px';
            hole.style.top = (y - 10) + 'px';
            holeContainer.appendChild(hole);
        }

        function createSparks(x, y) {
            for (let i = 0; i < 5; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.width = '4px';
                spark.style.height = '4px';
                spark.style.backgroundColor = '#ffdf00';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                spark.style.zIndex = '50';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 50;
                
                spark.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
                ], { duration: 300, easing: 'ease-out' });
                
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 300);
            }
        }

        function resetGame() {
            uploadOverlay.classList.remove('hidden');
            targetWrapper.classList.add('hidden');
            gun.classList.add('hidden');
            document.getElementById('imageInput').value = '';
        }
    </script>
</body>
</html>
